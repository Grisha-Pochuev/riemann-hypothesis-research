name: short-manual-check

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package
        run: python -m pip install -e .[dev]
      - name: Run tests
        run: pytest
      - name: Check one indexed zero
        run: python scripts/verify_zeros.py --count 1 --dps 30
